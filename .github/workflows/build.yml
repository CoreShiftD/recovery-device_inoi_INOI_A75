name: Build and Release All Recoveries INOI A75

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recovery: [twrp, pbrp, ofox]

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Cleanup / Free disk space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential curl python3 openjdk-11-jdk ccache rsync

      - name: Setup 24GB swap
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1G count=24 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h .

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          sudo mv repo /usr/local/bin/

      - name: Build ${{ matrix.recovery }}
        run: |
          set +e

          DEVICE_CODENAME="INOI_A75"
          DEVICE_DIR="device/inoi/$DEVICE_CODENAME"
          RECOVERY="${{ matrix.recovery }}"
          WORKSPACE="$GITHUB_WORKSPACE/rec_src"

          mkdir -p "$WORKSPACE"

          if [[ "$RECOVERY" == "ofox" ]]; then
            git clone --depth=1 https://gitlab.com/OrangeFox/sync.git "$GITHUB_WORKSPACE/ofox_sync"
            cd "$GITHUB_WORKSPACE/ofox_sync"
            ./orangefox_sync.sh --branch 12.1 --path "$WORKSPACE"
            cd "$WORKSPACE"

            mkdir -p "$DEVICE_DIR"
            rsync -av --exclude='.git' --exclude='.github' \
              "$GITHUB_WORKSPACE/device_tree/" "$DEVICE_DIR/"

          else
            cd "$WORKSPACE"

            case "$RECOVERY" in
              twrp)
                repo init --depth=1 \
                  -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
                  -b twrp-12.1
                ;;
              pbrp)
                repo init --depth=1 \
                  -u https://github.com/PitchBlackRecoveryProject/manifest_pb \
                  -b android-12.1
                ;;
            esac

            repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync

            mkdir -p "$DEVICE_DIR"
            rsync -av --exclude='.git' --exclude='.github' \
              "$GITHUB_WORKSPACE/device_tree/" "$DEVICE_DIR/"
          fi

          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh

          case "$RECOVERY" in
            twrp)
              lunch twrp_${DEVICE_CODENAME}-eng
              mka vendorbootimage
              ;;
            pbrp)
              lunch pb_${DEVICE_CODENAME}-eng
              mka pbrp
              ;;
            ofox)
              lunch twrp_${DEVICE_CODENAME}-eng
              mka adbd vendorbootimage
              ;;
          esac

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          OUT_DIR="out/target/product/${DEVICE_CODENAME}"

          if [[ "$RECOVERY" == "ofox" ]]; then
            # Prefer any non-vendor_boot.img output; fall back to vendor_boot.img.
            shopt -s nullglob
            imgs=("$OUT_DIR"/*.img)
            shopt -u nullglob

            named_img=""
            for f in "${imgs[@]}"; do
              if [[ "$(basename "$f")" != "vendor_boot.img" ]]; then
                named_img="$f"
                break
              fi
            done

            if [[ -n "$named_img" ]]; then
              cp "$named_img" "$GITHUB_WORKSPACE/artifacts/"
            elif [[ -f "$OUT_DIR/vendor_boot.img" ]]; then
              cp "$OUT_DIR/vendor_boot.img" "$GITHUB_WORKSPACE/artifacts/"
            else
              echo "No images produced for $RECOVERY"
              exit 1
            fi
          else
            if ls "$OUT_DIR"/*.img 1>/dev/null 2>&1; then
              cp "$OUT_DIR"/*.img "$GITHUB_WORKSPACE/artifacts/"
            else
              echo "No images produced for $RECOVERY"
              exit 1
            fi
          fi

      - name: Upload artifact
        if: hashFiles('artifacts/*.img') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.recovery }}-recovery
          path: artifacts/*.img

  collect_release:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=recovery-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_recoveries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "INOI A75 Recoveries ${{ steps.tag.outputs.tag }}"
          body: "Automated release — failed recoveries are omitted."
          files: all_recoveries/**/*.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}