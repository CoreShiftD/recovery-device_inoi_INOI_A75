name: Build Multi‑Recovery INOI A75 with Artifact

on:
  workflow_dispatch:
    inputs:
      recovery_type:
        description: "Select recovery to build"
        required: true
        default: "twrp"
        type: choice
        options:
          - twrp
          - pbrp
          - shrp
          - ofox

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Cleanup / Free disk space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential curl python3 openjdk-11-jdk ccache rsync

      - name: Setup 24GB swap
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1G count=24 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h .

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          sudo mv repo /usr/local/bin/

      - name: Build recovery
        run: |
          set +e

          DEVICE_CODENAME="INOI_A75"
          DEVICE_DIR="device/inoi/$DEVICE_CODENAME"
          RECOVERY="${{ github.event.inputs.recovery_type }}"
          WORKSPACE="$GITHUB_WORKSPACE/rec_src"

          mkdir -p "$WORKSPACE"

          if [[ "$RECOVERY" == "ofox" ]]; then
            git clone --depth=1 https://gitlab.com/OrangeFox/sync.git "$GITHUB_WORKSPACE/ofox_sync"
            cd "$GITHUB_WORKSPACE/ofox_sync"
            ./orangefox_sync.sh --branch 12.1 --path "$WORKSPACE"
            cd "$WORKSPACE"

          else
            cd "$WORKSPACE"

            case "$RECOVERY" in
              twrp)
                repo init --depth=1 \
                  -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
                  -b twrp-12.1
                ;;
              pbrp)
                repo init --depth=1 \
                  -u https://github.com/PitchBlackRecoveryProject/manifest_pb \
                  -b android-12.1
                ;;
              shrp)
                repo init --depth=1 \
                  -u https://github.com/SHRP-Reborn/manifest \
                  -b shrp-12.1
                ;;
            esac

            repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          fi

          # Place device tree after sync in all cases
          mkdir -p "$DEVICE_DIR"
          rsync -av --exclude='.git' --exclude='.github' \
            "$GITHUB_WORKSPACE/device_tree/" "$DEVICE_DIR/"

          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh

          case "$RECOVERY" in
            twrp)
              lunch twrp_${DEVICE_CODENAME}-eng
              mka vendorbootimage
              ;;
            pbrp)
              lunch pb_${DEVICE_CODENAME}-eng
              mka pbrp
              ;;
            shrp)
              lunch shrp_${DEVICE_CODENAME}-eng
              mka adbd vendorbootimage
              ;;
            ofox)
              lunch twrp_${DEVICE_CODENAME}-eng
              mka adbd vendorbootimage
              ;;
          esac

      - name: Upload recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.recovery_type }}-recovery
          path: rec_src/out/target/product/INOI_A75/*.img